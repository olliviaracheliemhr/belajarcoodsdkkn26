<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Coding Dasar</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Progress -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="progress-text">
            Soal <span id="nomorSoal">1</span> / <span id="totalSoal">10</span>
        </div>

        <!-- Card -->
        <div class="card">

            <h2 id="judul">🎯 Latihan Coding</h2>

            <p id="pertanyaan"></p>

            <pre id="kode"></pre>

            <div id="pilihan"></div>

            <div id="hasil"></div>

            <button id="nextBtn" onclick="nextQuestion()">
                Soal Berikutnya ➜
            </button>

        </div>

        <!-- Skor -->
        <div class="score-box">

            ⭐ Skor :
            <span id="score">0</span>

        </div>

    </div>


    <!-- Halaman selesai -->

    <div class="finish" id="finishPage">

        <h1>🎉 Selamat!</h1>

        <h2>Kamu telah menyelesaikan semua latihan.</h2>

        <br>

        <h3>
            Skor Akhir :
            <span id="finalScore"></span>
        </h3>

        <br>

        <button onclick="location.reload()">
            Ulangi Lagi
        </button>

    </div>


    <script src="soal.js"></script>
    <script src="script.js"></script>

</body>

</html>
